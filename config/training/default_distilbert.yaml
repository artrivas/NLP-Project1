model_name: distilbert-base-uncased
learning_rate: 2.0e-5
weight_decay: 0.01
num_train_epochs: 3
train_batch_size: 32
eval_batch_size: 64
max_length: 128
warmup_ratio: 0.06
logging_steps: 50
eval_steps: 250
save_steps: 500
metric_for_best_model: f1_macro
seed: 42
fp16: true
gradient_accumulation_steps: 1
save_total_limit: 2
